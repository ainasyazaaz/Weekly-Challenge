<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Capybara Challenge 🌿🦦</title>
    <!-- GENTLE AESTHETIC FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500&family=Quicksand:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* 🌿 CAPYBARA THEME PALETTE */
        :root {
            --bg-color: #f2e9e1;     /* Softest Beige (Like sand) */
            --card-bg: #ffffff;
            --accent-green: #e5f0e8;   /* Matcha/Jungle Pale Green */
            --accent-capy: #c7b299;    /* Gentle Brown (Capy Fur) */
            --text-main: #5d5c56;      /* Relaxed Dark Olive */
            --text-muted: #9c9a92;
            --button-main: #739e80;    /* Muted Jungle Leaf Green */
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(var(--accent-green) 1.5px, transparent 1.5px),
                radial-gradient(var(--accent-green) 1.5px, transparent 1.5px);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px; /* Subtle polka dots */
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 25px; /* Softer edges */
            box-shadow: 0 15px 40px rgba(0,0,0,0.04);
            text-align: center;
            border: 2px solid var(--accent-green);
        }

        .header-section {
            position: relative;
            margin-bottom: 30px;
        }

        /* The Capybara Graphic */
        .capy-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-weight: 500;
            font-size: 2rem;
            color: var(--button-main);
            margin: 0;
        }

        .week-tag {
            font-family: 'Quicksand', sans-serif;
            font-weight: 400;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-capy);
            margin-bottom: 10px;
            display: block;
        }

        .question-box {
            font-size: 1.15rem;
            line-height: 1.6;
            margin: 25px 0;
            padding: 25px;
            background: var(--accent-green);
            border-radius: 15px;
            border-left: 5px solid var(--button-main);
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--accent-green);
            border-radius: 12px;
            margin-bottom: 20px;
            outline: none;
            box-sizing: border-box;
            transition: border 0.3s, background 0.3s;
            font-family: 'Quicksand', sans-serif;
        }

        input:focus { 
            border-color: var(--accent-capy);
            background-color: #fafdfb;
        }

        button {
            background: var(--button-main);
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: opacity 0.3s, transform 0.2s;
            box-shadow: 0 4px 10px rgba(115, 158, 128, 0.2);
        }

        button:hover { 
            opacity: 0.9;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        #feedback {
            margin-top: 25px;
            font-size: 1rem;
            min-height: 1.2rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="capy-icon">🦦🌿</div>
        <span class="week-tag" id="weekDisplay">CHILL CHALLENGE</span>
        <h1 id="category">Weekly Riddle</h1>
    </div>
    
    <div class="question-box" id="question">
        Relaxing... Loading this week's question...
    </div>

    <input type="text" id="answerInput" placeholder="Type your answer here, friend...">
    <br>
    <button onclick="checkAnswer()">Submit</button>
    
    <p id="feedback"></p>
</div>

<script>
    // DATA: Add your questions here for each week
    const challenges = [
        { 
            week: "Week 1 (Relaxing)", 
            category: "Idioms", 
            question: "To 'Chill Out' means to relax. But what is a 'Couch Potato'?", 
            answer: "lazy person" 
        },
        { 
            week: "Week 2 (Focus)", 
            category: "Grammar", 
            question: "Find the plural: One 'Capybara', many...?", 
            answer: "capybaras" 
        },
        { 
            week: "Week 3 (Puzzling)", 
            category: "Riddle", 
            question: "I have rivers but no water, forests but no trees, and cities but no buildings. What am I?", 
            answer: "a map" 
        }
    ];

    // Change this index number (0, 1, 2...) every week!
    let currentWeek = 0; 

    const challenge = challenges[currentWeek];
    document.getElementById('weekDisplay').innerText = challenge.week;
    document.getElementById('category').innerText = challenge.category;
    document.getElementById('question').innerText = challenge.question;

    function checkAnswer() {
        const userAnswer = document.getElementById('answerInput').value.toLowerCase().trim();
        const feedback = document.getElementById('feedback');
        
        if (userAnswer === challenge.answer.toLowerCase()) {
            feedback.innerText = "✨ Correct! Very chill, indeed.";
            feedback.style.color = "#739e80"; // Correct green
        } else {
            feedback.innerText = "Not quite! Take a breath and try again.";
            feedback.style.color = "#c7b299"; // Capy brown
        }
    }
</script>

</body>
</html>
